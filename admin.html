<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="Painel de administração - Adicionar, editar e gerir medicamentos da Farmácia Fernandes.">
  <title>Admin - Adicionar Medicamento</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="admin-body">
  <div id="page-admin">
    <header class="admin-header">
      <div class="admin-header-content">
        <div class="admin-brand">
          <img src="img/Farmacialogo.png" alt="Farmácia Fernandes" class="admin-logo">
          <div class="admin-brand-text">
            <h1>Painel de Gerência</h1>
            <p>Farmácia Fernandes</p>
          </div>
        </div>
        <div class="admin-nav">
          <div class="admin-info">
            <span id="data-admin"></span>
            <span id="localizacao-admin"></span>
          </div>
          <div class="admin-actions">
            <a href="index.html" class="btn btn-outline-light btn-sm">Voltar</a>
            <button type="button" onclick="logout()" class="btn btn-danger btn-sm">Sair</button>
          </div>
        </div>
      </div>
    </header>

    <main class="admin-main">
      <div class="admin-container">
        <div class="admin-card">
          <div class="admin-card-header">
            <h2>Adicionar Medicamento</h2>
            <p>Preencha os campos abaixo para adicionar um novo medicamento ao catálogo</p>
          </div>

          <form id="admin-form" aria-label="Formulário adicionar medicamento" class="admin-form">
            <div class="form-row">
              <div class="form-group">
                <label for="nome">Nome do Medicamento</label>
                <input 
                  id="nome" 
                  class="form-control form-control-lg"
                  required 
                  placeholder="Ex: Paracetamol 500mg"
                  autocomplete="off">
              </div>

              <div class="form-group">
                <label for="principio">Princípio Ativo</label>
                <input 
                  id="principio" 
                  class="form-control form-control-lg"
                  required 
                  placeholder="Ex: Acetaminofeno"
                  autocomplete="off">
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="categoria">Categoria</label>
                <input 
                  id="categoria" 
                  class="form-control form-control-lg"
                  placeholder="Ex: Analgésico"
                  autocomplete="off">
              </div>

              <div class="form-group">
                <label for="stock">Stock</label>
                <input 
                  id="stock" 
                  class="form-control form-control-lg"
                  type="number" 
                  min="0" 
                  value="0">
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="preco">Preço (€)</label>
                <input 
                  id="preco" 
                  class="form-control form-control-lg"
                  type="number" 
                  step="0.01" 
                  min="0" 
                  placeholder="0.00">
              </div>

              <div class="form-group">
                <label for="validade">Data de Validade</label>
                <input 
                  id="validade" 
                  class="form-control form-control-lg"
                  type="date">
              </div>
            </div>

            <div class="form-actions">
              <button id="btn-submit" type="submit" class="btn btn-primary btn-lg btn-action">
                <span>✓</span> Adicionar
              </button>
              <button id="btn-cancelar" type="button" class="btn btn-secondary btn-lg btn-action" style="display:none;">
                <span>✕</span> Cancelar
              </button>
            </div>
          </form>

          <div id="admin-msg" class="admin-message"></div>
        </div>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
