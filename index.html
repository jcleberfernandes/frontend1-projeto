<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Farmácia - Lista de Medicamentos</title>
  <link rel="stylesheet" href="style.css">
  </head>
<body>
  <div id="page-home">
    <header>
      <div class="header-box">
        <div class="brand-mark">
          <img src="img/Farmacialogo.png" alt="FarmaciaFernandes" class="brand-logo">
        </div>
        <div class="brand-title">
          <h1>Farmácia Fernandes</h1>
          <p>Saúde • Cuidado • Bem-estar</p>
        </div>
        <div class="header-button">
          <a class="btn btn-primary" href="admin.html">Login</a>
        </div>
      </div>

      <div class="header-feature">
        <img src="img/FarmaciaFernandes.png" alt="Destaque" class="header-feature-image">
      </div>
    </header>

    <main>
      <div class="search-box">
        <input id="search-input" placeholder="Pesquisar por nome...">
        <button id="btn-refresh" class="btn btn-outline">Atualizar</button>
      </div>

      <section id="lista-medicamentos">
        <!-- Lista será inserida aqui pelo script.js -->
      </section>
    </main>
  </div>

  <footer>
    <p>Farmacia Fernandes</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
