<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="FarmaciaFernandes - Gestão de medicamentos">
  <meta name="theme-color" content="#0d9488">
  <title>FarmaciaFernandes</title>
  <link rel="stylesheet" href="style.css">
  
  <!-- BIBLIOTECA EXTERNA: Para adicionar, incluir aqui -->
  <!-- Exemplo: <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"> -->
</head>
<body>
  <!-- PÁGINA: LISTA -->
  <div id="page-home">
    <header>
      <div class="header-box">
        <h1>FarmaciaFernandes</h1>
        <button class="btn btn-primary" onclick="showPage('new')">+ Novo Medicamento</button>
      </div>
    </header>
    <main>
      <div class="search-box">
        <input type="text" id="search-input" placeholder="Pesquisar..." oninput="filterMedicamentos()">
        <select id="categoria-select" onchange="filterMedicamentos()">
          <option value="">Todas as categorias</option>
        </select>
      </div>
      <div id="lista-medicamentos"></div>
    </main>
  </div>

  <!-- PÁGINA: FORMULÁRIO -->
  <div id="page-form" class="hidden">
    <header>
      <div class="header-box">
        <button class="btn btn-outline" onclick="showPage('home')">← Voltar</button>
      </div>
    </header>
    <main>
      <div class="form-page">
        <h2 id="form-title">Novo Medicamento</h2>
        <form id="medicamento-form" onsubmit="salvarMedicamento(event)">
          <div class="form-group">
            <label>Nome</label>
            <input type="text" id="nome" required minlength="3" maxlength="100">
            <div class="error" id="error-nome"></div>
          </div>
          <div class="form-group">
            <label>Princípio Ativo</label>
            <input type="text" id="principioAtivo" required minlength="3">
            <div class="error" id="error-principioAtivo"></div>
          </div>
          <div class="form-group">
            <label>Categoria</label>
            <select id="categoria" required></select>
            <div class="error" id="error-categoria"></div>
          </div>
          <div class="form-group">
            <label>Stock</label>
            <input type="number" id="stock" min="0" required>
            <div class="error" id="error-stock"></div>
          </div>
          <div class="form-group">
            <label>Preço (€)</label>
            <input type="number" id="preco" step="0.01" min="0.01" required>
            <div class="error" id="error-preco"></div>
          </div>
          <div class="form-group">
            <label>Data de Validade</label>
            <input type="date" id="dataValidade" required>
            <div class="error" id="error-dataValidade"></div>
          </div>
          <div class="form-group">
            <label>Estado</label>
            <select id="estado" required>
              <option value="disponivel">Disponível</option>
              <option value="esgotado">Esgotado</option>
              <option value="descontinuado">Descontinuado</option>
            </select>
          </div>
          <div class="form-group">
            <button type="button" class="btn btn-outline" onclick="capturarLocalizacao()" id="btn-gps">📍 Captar Localização</button>
            <div class="error" id="error-gps"></div>
          </div>
          <div id="location-display" class="hidden location-box"></div>
          <div class="form-actions">
            <button type="button" class="btn btn-outline" onclick="showPage('home')">Cancelar</button>
            <button type="submit" class="btn btn-primary" id="btn-salvar">Criar</button>
          </div>
        </form>
      </div>
    </main>
  </div>

  <!-- MODAL DELETE -->
  <div id="modal-delete" class="modal hidden">
    <div class="modal-box">
      <h3>Confirmar Eliminação</h3>
      <p>Eliminar <strong id="delete-nome"></strong>?</p>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-danger" onclick="confirmarDelete()">Eliminar</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
