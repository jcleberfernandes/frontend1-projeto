<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login - Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Login Admin</h1>
    <nav>
      <a href="index.html">Voltar à lista</a>
    </nav>
  </header>

  <main>
    <form onsubmit="loginSubmit(event)">
      <label>Utilizador</label>
      <input id="login-user" required>

      <label>Senha</label>
      <input id="login-pass" type="password" required>

      <div class="form-actions">
        <button type="submit">Entrar</button>
      </div>
    </form>

    <div id="login-msg" class="small muted"></div>
    <p class="small" style="margin-top:0.75rem;color:#444">Credenciais de demonstração: <strong>admin</strong> / <strong>1234</strong></p>
  </main>

  <script src="script.js"></script>
</body>
</html>
