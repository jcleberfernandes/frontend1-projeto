<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="Acesso ao painel administrativo da Farmácia Fernandes para gerenciar medicamentos.">
  <title>Login - Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <img src="img/Farmacialogo.png" alt="Farmácia Fernandes" class="login-logo">
        <h1>Painel Admin</h1>
        <p class="login-subtitle">Farmácia Fernandes</p>
      </div>

      <form id="login-form" onsubmit="loginSubmit(event)" class="login-form">
        <div class="form-group mb-3">
          <label for="login-user" class="form-label">Utilizador</label>
          <input 
            id="login-user" 
            class="form-control form-control-lg"
            type="text"
            placeholder="Introduza seu utilizador"
            required
            autocomplete="username">
        </div>

        <div class="form-group mb-4">
          <label for="login-pass" class="form-label">Senha</label>
          <input 
            id="login-pass" 
            class="form-control form-control-lg"
            type="password"
            placeholder="Introduza sua senha"
            required
            autocomplete="current-password">
        </div>

        <button type="submit" class="btn btn-primary btn-lg w-100 btn-login">
          Entrar
        </button>
      </form>

      <div id="login-msg" class="alert alert-danger mt-3" style="display:none; margin-bottom:0;"></div>

      <div class="login-footer">
        <p class="text-muted">Credenciais de demonstração:</p>
        <div class="credentials-box">
          <div class="credential-item">
            <span class="credential-label">Utilizador:</span>
            <code>admin</code>
          </div>
          <div class="credential-item">
            <span class="credential-label">Senha:</span>
            <code>1234</code>
          </div>
        </div>
      </div>

      <div class="login-links">
        <a href="index.html" class="link-back">← Voltar à lista de medicamentos</a>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
